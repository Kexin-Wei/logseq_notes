<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="700" height="260" viewBox="-10 -10 720 280">
  <style>
    .box { fill: #fff; stroke: #000; stroke-width: 2; }
    .label { font-family: Helvetica; font-size: 12px; text-anchor: middle; }
    .label-small { font-family: Helvetica; font-size: 10px; text-anchor: middle; fill: #555; }
    .title { font-family: Helvetica; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .group { fill: none; stroke: #666; stroke-width: 1.5; stroke-dasharray: 5,3; rx: 8; }
    .arrow-label { font-family: Helvetica; font-size: 10px; text-anchor: middle; fill: #666; }
  </style>

  <!-- Monitor Script (top center) -->
  <rect x="270" y="10" width="160" height="45" rx="7" class="box"/>
  <text x="350" y="38" class="title">Monitor</text>

  <!-- Arrows from Monitor to each component -->
  <!-- To Config Generator -->
  <path d="M 300 55 L 100 90" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="100" cy="90" r="3" fill="#000"/>
  <text x="190" y="70" class="arrow-label">triggers</text>

  <!-- To Validators -->
  <path d="M 330 55 L 290 90" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="290" cy="90" r="3" fill="#000"/>

  <!-- To Attacker -->
  <path d="M 370 55 L 440 90" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="440" cy="90" r="3" fill="#000"/>

  <!-- To Patcher -->
  <path d="M 400 55 L 600 90" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="600" cy="90" r="3" fill="#000"/>

  <!-- Config Generator group -->
  <rect x="10" y="90" width="180" height="155" class="group" rx="8"/>
  <text x="100" y="115" class="title" style="font-size:13px">Config Generator</text>
  <rect x="30" y="125" width="140" height="35" rx="5" class="box"/>
  <text x="100" y="147" class="label">Docker Config</text>
  <rect x="30" y="170" width="140" height="35" rx="5" class="box"/>
  <text x="100" y="192" class="label">Ground Truth</text>

  <!-- Validators group -->
  <rect x="210" y="90" width="180" height="155" class="group" rx="8"/>
  <text x="300" y="115" class="title" style="font-size:13px">Validators</text>
  <rect x="230" y="125" width="140" height="35" rx="5" class="box"/>
  <text x="300" y="147" class="label">Static Checker</text>
  <rect x="230" y="170" width="140" height="35" rx="5" class="box"/>
  <text x="300" y="192" class="label">LLM Based</text>

  <!-- Attacker group -->
  <rect x="410" y="90" width="160" height="155" class="group" rx="8"/>
  <text x="490" y="115" class="title" style="font-size:13px">Attacker</text>
  <rect x="425" y="125" width="130" height="35" rx="5" class="box"/>
  <text x="490" y="147" class="label">Grey Box</text>
  <rect x="425" y="170" width="130" height="35" rx="5" class="box"/>
  <text x="490" y="192" class="label">Black Box</text>

  <!-- Patcher -->
  <rect x="590" y="90" width="100" height="45" rx="7" class="box"/>
  <text x="640" y="118" class="title" style="font-size:13px">Patcher</text>
</svg>
