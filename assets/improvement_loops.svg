<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="520" height="700" viewBox="-10 -10 540 720">
  <style>
    .box { fill: #fff; stroke: #000; stroke-width: 2; }
    .decision { fill: #fff; stroke: #000; stroke-width: 2; }
    .label { font-family: Helvetica; font-size: 12px; text-anchor: middle; }
    .label-small { font-family: Helvetica; font-size: 11px; text-anchor: middle; fill: #000; }
    .title { font-family: Helvetica; font-size: 14px; font-weight: bold; text-anchor: middle; }
    .loop-box { fill: none; stroke: #666; stroke-width: 2; stroke-dasharray: 5,3; rx: 10; }
  </style>

  <!-- Generator Loop Box -->
  <rect x="20" y="10" width="460" height="320" class="loop-box" rx="10"/>
  <text x="250" y="35" class="title">GENERATOR LOOP</text>

  <!-- Positive Case -->
  <rect x="60" y="55" width="180" height="50" rx="7" class="box"/>
  <text x="150" y="85" class="label">Positive Case Generated</text>

  <!-- Arrow down -->
  <path d="M 150 105 L 150 135" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="150,140 146,133 154,133" fill="#000"/>

  <!-- Exploit validates -->
  <rect x="60" y="140" width="180" height="50" rx="7" class="box"/>
  <text x="150" y="170" class="label">Exploit Script Validates</text>

  <!-- Decision diamond -->
  <polygon points="150,210 250,250 150,290 50,250" class="decision"/>
  <text x="150" y="255" class="label">Success?</text>

  <!-- Yes arrow (down) -->
  <path d="M 150 290 L 150 360" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="150,365 146,358 154,358" fill="#000"/>
  <text x="160" y="320" class="label-small">Yes</text>

  <!-- No arrow (right) -->
  <path d="M 250 250 L 350 250 L 350 150 L 400 150" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="405,150 398,146 398,154" fill="#000"/>
  <text x="290" y="240" class="label-small">No</text>

  <!-- Fix generator box -->
  <rect x="405" y="120" width="60" height="60" rx="7" class="box"/>
  <text x="435" y="145" class="label" style="font-size:10px">Fix</text>
  <text x="435" y="160" class="label" style="font-size:10px">Generator</text>

  <!-- Loop back from fix -->
  <path d="M 435 120 L 435 80 L 246 80" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="240,80 247,76 247,84" fill="#000"/>

  <!-- Derive cases box -->
  <rect x="60" y="365" width="180" height="50" rx="7" class="box"/>
  <text x="150" y="385" class="label">Derive Negative (patch)</text>
  <text x="150" y="400" class="label">&amp; Confounding (mix types)</text>

  <!-- Add to knowledge -->
  <rect x="280" y="365" width="180" height="50" rx="7" class="box"/>
  <text x="370" y="385" class="label">Add pattern to</text>
  <text x="370" y="400" class="label">Knowledge Base</text>

  <!-- Arrow to knowledge -->
  <path d="M 240 390 L 274 390" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="280,390 273,386 273,394" fill="#000"/>

  <!-- Connector between loops -->
  <path d="M 150 415 L 150 455" fill="none" stroke="#000" stroke-width="2"/>
  <polygon points="150,460 144,450 156,450" fill="#000"/>

  <!-- Validator Loop Box -->
  <rect x="20" y="465" width="460" height="225" class="loop-box" rx="10"/>
  <text x="250" y="490" class="title">VALIDATOR LOOP</text>

  <!-- Attacker runs -->
  <rect x="60" y="505" width="180" height="50" rx="7" class="box"/>
  <text x="150" y="525" class="label">Attacker Agent runs on</text>
  <text x="150" y="540" class="label">Negative / Confounding</text>

  <!-- Arrow down -->
  <path d="M 150 555 L 150 575" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="150,580 146,573 154,573" fill="#000"/>

  <!-- Generate report -->
  <rect x="60" y="580" width="180" height="40" rx="7" class="box"/>
  <text x="150" y="605" class="label">Generate Report (JSON)</text>

  <!-- Arrow down -->
  <path d="M 150 620 L 150 640" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="150,645 146,638 154,638" fill="#000"/>

  <!-- Validate -->
  <rect x="60" y="645" width="180" height="40" rx="7" class="box"/>
  <text x="150" y="670" class="label">validate() compares</text>

  <!-- FP box -->
  <rect x="280" y="505" width="180" height="60" rx="7" class="box"/>
  <text x="370" y="525" class="label">FP: reported non-existent</text>
  <text x="370" y="545" class="label">Refine attacker prompt</text>

  <!-- FN box -->
  <rect x="280" y="580" width="180" height="60" rx="7" class="box"/>
  <text x="370" y="600" class="label">FN: missed existing vuln</text>
  <text x="370" y="620" class="label">Expand exploit coverage</text>

  <!-- Arrow to FP -->
  <path d="M 240 655 L 260 655 L 260 535 L 274 535" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="280,535 273,531 273,539" fill="#000"/>

  <!-- Arrow to FN -->
  <path d="M 240 670 L 255 670 L 255 610 L 274 610" fill="none" stroke="#000" stroke-width="1"/>
  <polygon points="280,610 273,606 273,614" fill="#000"/>

</svg>